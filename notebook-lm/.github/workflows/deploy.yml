name: Deploy to Render

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger backend deploy
        run: curl -X POST "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}"

      - name: Trigger frontend deploy
        run: curl -X POST "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}"